<div class="bg-ocean-base p-5 rounded-t-3xl border-t border-ocean-light flex flex-col gap-4 shadow-2xl h-5/6">
  
  <header class="flex flex-col items-center">
    <h2 class="text-lg font-bold text-text-light text-center w-full">{{ data.titulo }}</h2>
  </header>

  <div class="flex flex-col gap-3 overflow-y-auto no-scrollbar pb-4">
    
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-bold text-shark-base uppercase tracking-widest ml-1">
        Nombre <span class="text-bites-base">*</span>
      </label>
      <input #nombreInput type="text" 
        [value]="data.nombreInicial || ''"
        [placeholder]="data.placeholderNombre" 
        [class.border-bites-base]="intentadoGuardar() && !nombreInput.value"
        class="bg-shark-dark border border-shark-base rounded-xl p-4 text-sm text-text-light outline-hidden focus:border-ocean-light transition-all">
    </div>
    
    <div class="flex flex-col gap-1.5">
      <div class="flex justify-between items-center ml-1 pr-1">
        <label class="text-xs font-bold text-shark-base uppercase tracking-widest">Descripción</label>
        <span class="text-xs font-bold text-shark-base" [class.text-bites-base]="descInput.value.length === 100">
          {{ descInput.value.length }} / 100
        </span>
      </div>
      <textarea #descInput 
        [value]="data.descInicial || ''"
        (input)="0"
        maxlength="100"
        placeholder="Opcional" rows="2"
        class="bg-shark-dark border border-shark-base rounded-xl p-4 text-sm text-text-light outline-hidden focus:border-ocean-light transition-all resize-none"></textarea>
    </div>

    @if (data.modo === 'tarea' || !data.modo) {
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-shark-base uppercase tracking-widest ml-1">Fecha Límite</label>
        <div class="relative">
          <button type="button" (click)="picker.open()" class="w-full bg-shark-dark border border-shark-base rounded-xl p-4 text-left flex items-center gap-3 active:scale-95 transition-transform">
            <mat-icon class="text-ocean-light size-5 text-xl leading-none">calendar_today</mat-icon>
            <span class="text-text-light text-sm flex-1">
              {{ fechaSeleccionada() ? (fechaSeleccionada() | date:'dd / MM / yyyy') : 'Opcional' }}
            </span>
          </button>
          <input [matDatepicker]="picker" class="hidden" (dateChange)="onFechaCambiada($event)">
          <mat-datepicker #picker touchUi></mat-datepicker>
        </div>
      </div>
    }

    @if (data.modo === 'rutina') {
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-shark-base uppercase tracking-widest ml-1"
          [class.text-bites-base]="intentadoGuardar() && diasSeleccionados().length === 0">
          Días <span class="text-bites-base">*</span>
        </label>
        
        <div class="flex gap-1.5 justify-between w-full">
          <button type="button" (click)="toggleTodos()" 
            [class.bg-bites-base]="todosSeleccionados()"
            [class.bg-shark-dark]="!todosSeleccionados()"
            [class.text-text-light]="todosSeleccionados()"
            [class.border-bites-base]="todosSeleccionados() || (intentadoGuardar() && diasSeleccionados().length === 0)"
            [class.border-shark-base]="!todosSeleccionados() && !(intentadoGuardar() && diasSeleccionados().length === 0)"
            class="flex-1 h-11 border rounded-lg text-xs font-bold text-shark-base transition-colors active:scale-95 shadow-xs">
            Todos
          </button>

          @for (dia of diasSemana; track dia.id) {
            <button type="button" (click)="toggleDia(dia.id)"
              [class.bg-bites-base]="diasSeleccionados().includes(dia.id)"
              [class.bg-shark-dark]="!diasSeleccionados().includes(dia.id)"
              [class.text-text-light]="diasSeleccionados().includes(dia.id)"
              [class.border-bites-base]="diasSeleccionados().includes(dia.id) || (intentadoGuardar() && diasSeleccionados().length === 0)"
              [class.border-shark-base]="!diasSeleccionados().includes(dia.id) && !(intentadoGuardar() && diasSeleccionados().length === 0)"
              class="size-11 flex items-center justify-center border rounded-lg text-xs font-bold text-shark-base transition-colors active:scale-95 shadow-xs">
              {{ dia.letra }}
            </button>
          }
        </div>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-shark-base uppercase tracking-widest ml-1">Hora</label>
        <div class="relative w-full bg-shark-dark border border-shark-base rounded-xl flex items-center transition-colors focus-within:border-ocean-light overflow-hidden">
          <input type="time" [value]="horaSeleccionada() || ''" (change)="onHoraCambiada($event)"
            class="w-full bg-transparent p-4 text-sm text-text-light outline-hidden">
        </div>
      </div>
    }

    <div class="flex flex-col gap-1.5 mt-2">
      <label class="text-xs font-bold text-shark-base uppercase tracking-widest ml-1"
        [class.text-bites-base]="intentadoGuardar() && dificultadSeleccionada() === null">
        Nivel de Dificultad <span class="text-bites-base">*</span>
      </label>
      
      <div class="flex h-12 w-full bg-shark-dark rounded-full border-2 overflow-hidden transition-colors"
        [class.border-bites-base]="intentadoGuardar() && dificultadSeleccionada() === null"
        [class.border-shark-base]="!(intentadoGuardar() && dificultadSeleccionada() === null)">
        
        <button type="button" (click)="seleccionarDificultad(1)" 
          [style.background-color]="'var(--color-diff-1)'"
          [class.opacity-100]="dificultadSeleccionada() === 1"
          [class.opacity-20]="dificultadSeleccionada() !== 1"
          class="flex-1 h-full transition-all duration-200 flex items-center justify-center border-r border-shark-base/30">
          <span class="text-xs font-black text-text-dark uppercase leading-none tracking-tighter text-center">Muy<br>Fácil</span>
        </button>

        <button type="button" (click)="seleccionarDificultad(2)" 
          [style.background-color]="'var(--color-diff-2)'"
          [class.opacity-100]="dificultadSeleccionada() === 2"
          [class.opacity-20]="dificultadSeleccionada() !== 2"
          class="flex-1 h-full transition-all duration-200 flex items-center justify-center border-r border-shark-base/30">
          <span class="text-xs font-black text-text-dark uppercase leading-none tracking-tighter text-center">Fácil</span>
        </button>

        <button type="button" (click)="seleccionarDificultad(3)" 
          [style.background-color]="'var(--color-diff-3)'"
          [class.opacity-100]="dificultadSeleccionada() === 3"
          [class.opacity-20]="dificultadSeleccionada() !== 3"
          class="flex-1 h-full transition-all duration-200 flex items-center justify-center border-r border-shark-base/30">
          <span class="text-xs font-black text-text-light uppercase leading-none tracking-tighter text-center">Normal</span>
        </button>

        <button type="button" (click)="seleccionarDificultad(4)" 
          [style.background-color]="'var(--color-diff-4)'"
          [class.opacity-100]="dificultadSeleccionada() === 4"
          [class.opacity-20]="dificultadSeleccionada() !== 4"
          class="flex-1 h-full transition-all duration-200 flex items-center justify-center border-r border-shark-base/30">
          <span class="text-xs font-black text-text-light uppercase leading-none tracking-tighter text-center">Difícil</span>
        </button>

        <button type="button" (click)="seleccionarDificultad(5)" 
          [style.background-color]="'var(--color-diff-5)'"
          [class.opacity-100]="dificultadSeleccionada() === 5"
          [class.opacity-20]="dificultadSeleccionada() !== 5"
          class="flex-1 h-full transition-all duration-200 flex items-center justify-center">
          <span class="text-xs font-black text-text-light uppercase leading-none tracking-tighter text-center">Abisal</span>
        </button>
      </div>
    </div>
  </div>

  <div class="flex gap-3 mt-auto pt-2 shrink-0">
    <button (click)="cerrar()" class="flex-1 h-12 rounded-xl text-sm font-bold text-text-light bg-shark-dark border border-shark-base active:scale-95 transition-transform shadow-xs">
      Cancelar
    </button>
    <button (click)="guardar(nombreInput.value, descInput.value)" class="flex-1 h-12 rounded-xl text-sm font-bold text-text-light bg-ocean-light border border-ocean-dark shadow-lg active:scale-95 transition-transform">
      Confirmar
    </button>
  </div>

</div>
